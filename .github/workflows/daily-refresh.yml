name: Daily Conference Refresh

on:
  schedule:
    # GitHub schedule cron is UTC. These two hours cover 10:00 Europe/Warsaw
    # across standard time and daylight saving time; the job gates by Warsaw hour.
    - cron: "0 8,9 * * *"
  workflow_dispatch:

concurrency:
  group: daily-conference-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check Warsaw local time
        id: warsaw-time
        run: |
          node -e "const parts=new Intl.DateTimeFormat('en-GB',{timeZone:'Europe/Warsaw',hour:'2-digit',minute:'2-digit',hour12:false}).formatToParts(new Date()).reduce((a,p)=>(a[p.type]=p.value,a),{}); const ok=parts.hour==='10'; console.log(`local=${parts.hour}:${parts.minute}`); console.log(`should_run=${ok}`); require('fs').appendFileSync(process.env.GITHUB_OUTPUT,`should_run=${ok}\nlocal=${parts.hour}:${parts.minute}\n`)"

      - name: Checkout
        if: steps.warsaw-time.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: steps.warsaw-time.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: steps.warsaw-time.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        run: npm ci

      - name: Run refresh dry run
        if: steps.warsaw-time.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        env:
          REFRESH_MODE: dry-run
        run: npm run refresh:dry-run

      - name: Upload run summary
        if: steps.warsaw-time.outputs.should_run == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v5
        with:
          name: refresh-summary
          path: artifacts/last-refresh-summary.json
